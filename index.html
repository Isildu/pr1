<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Curriculum Vitae</title>
</head>
<body>
    <h1>Curriculum Vitae</h1>
    
    <form action="#" method="post">
        
        <fieldset>
            <legend>Datos Personales</legend>
            
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>
            
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" required>
            <br><br>
            
            <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
            <br><br>
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono">
            <br><br>
            
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">
            <br><br>
            
            <label>Sexo:</label>
            <input type="radio" id="masculino" name="sexo" value="masculino">
            <label for="masculino">Masculino</label>
            <input type="radio" id="femenino" name="sexo" value="femenino">
            <label for="femenino">Femenino</label>
            <input type="radio" id="otro" name="sexo" value="otro">
            <label for="otro">Otro</label>
        </fieldset>
        
        <br>
        
        <fieldset>
            <legend>Formación Académica</legend>
            
            <label for="nivel_estudios">Nivel de Estudios:</label>
            <select id="nivel_estudios" name="nivel_estudios">
                <option value="">Seleccione una opción</option>
                <option value="primaria">Educación Primaria</option>
                <option value="secundaria">Educación Secundaria</option>
                <option value="bachillerato">Bachillerato</option>
                <option value="grado">Grado Universitario</option>
                <option value="master">Máster</option>
                <option value="doctorado">Doctorado</option>
            </select>
            <br><br>
            
            <label for="titulacion">Titulación:</label>
            <input type="text" id="titulacion" name="titulacion">
            <br><br>
            
            <label for="centro_educativo">Centro Educativo:</label>
            <input type="text" id="centro_educativo" name="centro_educativo">
            <br><br>
            
            <label for="anio_inicio">Año de Inicio:</label>
            <input type="number" id="anio_inicio" name="anio_inicio" min="1950" max="2026">
            <br><br>
            
            <label for="anio_fin">Año de Finalización:</label>
            <input type="number" id="anio_fin" name="anio_fin" min="1950" max="2026">
        </fieldset>
        
        <br>
        
        <fieldset>
            <legend>Experiencia Laboral</legend>
            
            <label for="empresa">Empresa:</label>
            <input type="text" id="empresa" name="empresa">
            <br><br>
            
            <label for="puesto">Puesto:</label>
            <input type="text" id="puesto" name="puesto">
            <br><br>
            
            <label for="fecha_inicio">Fecha de Inicio:</label>
            <input type="date" id="fecha_inicio" name="fecha_inicio">
            <br><br>
            
            <label for="fecha_fin">Fecha de Fin:</label>
            <input type="date" id="fecha_fin" name="fecha_fin">
            <br><br>
            
            <label for="descripcion_trabajo">Descripción del Puesto:</label>
            <br>
            <textarea id="descripcion_trabajo" name="descripcion_trabajo" rows="4" cols="50"></textarea>
        </fieldset>
        
        <br>
        
        <fieldset>
            <legend>Idiomas</legend>
            
            <label for="idioma">Idioma:</label>
            <input type="text" id="idioma" name="idioma" placeholder="Ej: Inglés, Francés, Alemán">
            <br><br>
            
            <label for="nivel_idioma">Nivel:</label>
            <select id="nivel_idioma" name="nivel_idioma">
                <option value="">Seleccione un nivel</option>
                <option value="basico">Básico</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
                <option value="nativo">Nativo</option>
            </select>
        </fieldset>
        
        <br>
        
        <fieldset>
            <legend>Habilidades</legend>
            
            <label>Competencias:</label>
            <br>
            <input type="checkbox" id="trabajo_equipo" name="habilidades" value="trabajo_equipo">
            <label for="trabajo_equipo">Trabajo en equipo</label>
            <br>
            <input type="checkbox" id="liderazgo" name="habilidades" value="liderazgo">
            <label for="liderazgo">Liderazgo</label>
            <br>
            <input type="checkbox" id="comunicacion" name="habilidades" value="comunicacion">
            <label for="comunicacion">Comunicación</label>
            <br>
            <input type="checkbox" id="informatica" name="habilidades" value="informatica">
            <label for="informatica">Informática</label>
            <br>
            <input type="checkbox" id="organizacion" name="habilidades" value="organizacion">
            <label for="organizacion">Organización</label>
            <br><br>
            
            <label for="otras_habilidades">Otras habilidades:</label>
            <br>
            <textarea id="otras_habilidades" name="otras_habilidades" rows="3" cols="50"></textarea>
        </fieldset>
        
        <br>
        
        <fieldset>
            <legend>Otros Datos</legend>
            
            <label for="carnet_conducir">Carnet de Conducir:</label>
            <select id="carnet_conducir" name="carnet_conducir">
                <option value="no">No</option>
                <option value="b">Tipo B</option>
                <option value="a">Tipo A</option>
                <option value="c">Tipo C</option>
            </select>
            <br><br>
            
            <label for="disponibilidad">Disponibilidad para viajar:</label>
            <input type="radio" id="si_disponible" name="disponibilidad" value="si">
            <label for="si_disponible">Sí</label>
            <input type="radio" id="no_disponible" name="disponibilidad" value="no">
            <label for="no_disponible">No</label>
        </fieldset>
        
        <br>
        
        <input type="submit" value="Enviar CV">
        <input type="reset" value="Limpiar formulario">
        
    </form>
</body>
</html>
